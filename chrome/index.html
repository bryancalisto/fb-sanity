<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FB Sanity</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff;
        --panel: #fff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #1877f2;
        --dark-blue: #001a75;
        --border: #d1d5db;
      }

      body {
        margin: 0;
        width: 260px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .panel {
        padding: 14px;
        background: var(--panel);
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }

      label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 0;
        font-size: 13px;
        border-top: 1px solid var(--border);
      }

      input {
        margin-top: 2px;
        accent-color: var(--accent);
      }

      .top-container {
        display: flex;
        flex-direction: row;
        justify-content: center;
        background-color: var(--dark-blue);
        padding: 15px;
      }

    </style>
  </head>
  <body>
    <div class="top-container">
      <img src="icon.png" alt="FB Sanity" width="120px" height="120px" />
    </div>

    <div class="panel">
      <p>Toggle which areas stay hidden</p>
      <label>
        <input id="hideReactionsBar" type="checkbox" checked />
        <span>Reactions summary</span>
      </label>
      <label>
        <input id="hideFullContainer" type="checkbox" checked />
        <span>Full reactions container</span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
